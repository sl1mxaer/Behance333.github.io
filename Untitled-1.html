<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видео с плеером</title>
    <style>
        body { margin: 0; padding: 0; background: #fff; }
        .full-width-image { display: block; width: 100%; height: auto; }
        .spacer { height: 30px; width: 100%; }
        .video-row { display: flex; flex-wrap: wrap; }
        .video-item { 
            flex: 1 1 25%; 
            box-sizing: border-box; 
            min-width: 200px; 
            /* cursor: pointer;  теперь курсор не обязательно менять, потому что плеер сам показывает, что можно нажать */
        }
        .video-item video { 
            width: 100%; 
            height: auto; 
            display: block; 
            /* pointer-events: none;  - УБИРАЕМ эту строчку, чтобы можно было нажимать на кнопки плеера */
        }
        @media (max-width: 800px) { .video-item { flex: 1 1 50%; } }
        @media (max-width: 480px) { .video-item { flex: 1 1 100%; } }
    </style>
</head>
<body>
    <img src="1.png" alt="Изображение" class="full-width-image">
    <div class="spacer"></div>

    <div class="video-row">
        <!-- Добавлен атрибут controls -->
        <div class="video-item">
            <video controls loop playsinline>
                <source src="13.mp4" type="video/mp4">
            </video>
        </div>
        <div class="video-item">
            <video controls loop playsinline>
                <source src="13.mp4" type="video/mp4">
            </video>
        </div>
        <div class="video-item">
            <video controls loop playsinline>
                <source src="13.mp4" type="video/mp4">
            </video>
        </div>
        <div class="video-item">
            <video controls loop playsinline>
                <source src="13.mp4" type="video/mp4">
            </video>
        </div>
    </div>
</body>
</html>
