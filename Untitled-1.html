<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видео по клику</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fff;
        }
        .full-width-image {
            display: block;
            width: 100%;
            height: auto;
            object-fit: cover;
        }
        .spacer {
            height: 30px;
            width: 100%;
        }
        .video-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0;
        }
        .video-item {
            flex: 1 1 25%;
            box-sizing: border-box;
            min-width: 200px;
            cursor: pointer; /* чтобы было видно, что видео кликабельно */
        }
        .video-item video {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none; /* отключаем стандартное поведение браузера, чтобы наш скрипт полностью управлял кликами */
        }
        /* Для мобильных адаптация */
        @media (max-width: 800px) {
            .video-item {
                flex: 1 1 50%;
            }
        }
        @media (max-width: 480px) {
            .video-item {
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>
    <img src="1.png" alt="Изображение" class="full-width-image">
    <div class="spacer"></div>

    <div class="video-row">
        <div class="video-item" onclick="toggleVideo(this)">
            <video loop playsinline>
                <source src="13.mp4" type="video/mp4">
                Ваш браузер не поддерживает видео.
            </video>
        </div>
        <div class="video-item" onclick="toggleVideo(this)">
            <video loop playsinline>
                <source src="13.mp4" type="video/mp4">
            </video>
        </div>
        <div class="video-item" onclick="toggleVideo(this)">
            <video loop playsinline>
                <source src="13.mp4" type="video/mp4">
            </video>
        </div>
        <div class="video-item" onclick="toggleVideo(this)">
            <video loop playsinline>
                <source src="13.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <script>
        function toggleVideo(container) {
            const video = container.querySelector('video');
            if (video.paused) {
                video.play().catch(e => console.log('Ошибка воспроизведения:', e));
            } else {
                video.pause();
            }
        }
    </script>
</body>
</html>
